services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./goalpace.db
      - CORS_ORIGINS=http://localhost,http://localhost:3000
      - OLLAMA_URL=http://host.docker.internal:11434
    volumes:
      - db-data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
